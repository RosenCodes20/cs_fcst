<script>
    function celebrate() {
        document.getElementById('animation-result').innerHTML = '<h4 style="margin-top:20px; color:#166534;">ЧЕСТИТО! Очакваме те! 🎊</h4>';

        const duration = 3 * 1000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        const interval = setInterval(function() {
            const timeLeft = animationEnd - Date.now();

            if (timeLeft <= 0) {
                return clearInterval(interval);
            }

            const particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, {
                particleCount,
                origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
            }));
            confetti(Object.assign({}, defaults, {
                particleCount,
                origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
            }));
        }, 250);
    }

    function showSadness() {
        document.getElementById('animation-result').innerHTML = `
            <div class="sad-emoji-anim">😢</div>
            <p style="background:none !important; border:none !important; color:#64748b !important; text-align:center !important; box-shadow:none !important;">
                Не се отказвай! Опитай отново следващия път!
            </p>
        `;
    }

    // Опционално: Преместване на секцията автоматично след заглавието "Учебна 2025/26 г."
    document.addEventListener("DOMContentLoaded", function() {
        const headings = document.querySelectorAll('h2');
        headings.forEach(h => {
            if (h.textContent.includes('2025/26')) {
                const checker = document.getElementById('checker-section');
                h.parentNode.insertBefore(checker, h.nextSibling);
            }
        });
    });
</script>
